<!doctype html><meta charset=utf-8><title>smolvm pacman repository</title>
<h1>smolvm pacman repository</h1>
<p>Arch Linux repository for <a href="https://github.com/smol-machines/smolvm">smolvm</a>.</p>
<pre>
[smol-machines]
SigLevel = Optional TrustAll
Server = https://smol-machines.github.io/smolvm/pacman/$arch
</pre>
<p>Then <code>pacman -Sy smolvm</code>. See <a href="https://github.com/smol-machines/smolvm/blob/main/docs/install-arch.md">install docs</a>.</p>
