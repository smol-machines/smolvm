<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM - smolvm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #ccc;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            padding: 1rem;
            text-align: center;
        }
        header h1 {
            color: #c00;

        }
        header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.25rem;
        }

            width: 640px;
            height: 400px;
            max-width: 100vw;
        }

            padding: 1rem;

            color: #555;

    <script>
        Dos(document.getElementById("jsdos")).run(
